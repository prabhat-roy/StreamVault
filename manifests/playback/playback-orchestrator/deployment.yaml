apiVersion: apps/v1
kind: Deployment
metadata:
  name: playback-orchestrator
  namespace: streamvault
  labels: { app.kubernetes.io/name: playback-orchestrator, app.kubernetes.io/part-of: streamvault, streamvault.io/domain: playback }
spec:
  replicas: 6
  selector: { matchLabels: { app.kubernetes.io/name: playback-orchestrator } }
  template:
    metadata: { labels: { app.kubernetes.io/name: playback-orchestrator, streamvault.io/domain: playback } }
    spec:
      serviceAccountName: playback-orchestrator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: playback-orchestrator
          image: harbor.streamvault.internal/streamvault/playback-orchestrator:latest
          ports: [{ containerPort: 50060, name: http }]
          envFrom: [{ configMapRef: { name: playback-orchestrator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50060 } }
          readinessProbe: { httpGet: { path: /healthz, port: 50060 } }
          resources: { requests: { cpu: 500m, memory: 768Mi }, limits: { cpu: 3000m, memory: 3Gi } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
