apiVersion: apps/v1
kind: Deployment
metadata:
  name: quality-selector
  namespace: streamvault
  labels:
    app.kubernetes.io/name: quality-selector
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: playback
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: quality-selector } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: quality-selector, streamvault.io/domain: playback }
    spec:
      serviceAccountName: quality-selector
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: quality-selector
          image: harbor.streamvault.internal/streamvault/quality-selector:latest
          ports: [{ containerPort: 50162, name: http }]
          envFrom: [{ configMapRef: { name: quality-selector } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50162 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
