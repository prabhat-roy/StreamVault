apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-insertion
  namespace: streamvault
  labels:
    app.kubernetes.io/name: ad-insertion
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: playback
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: ad-insertion } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ad-insertion, streamvault.io/domain: playback }
    spec:
      serviceAccountName: ad-insertion
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: ad-insertion
          image: harbor.streamvault.internal/streamvault/ad-insertion:latest
          ports: [{ containerPort: 50163, name: http }]
          envFrom: [{ configMapRef: { name: ad-insertion } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50163 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
