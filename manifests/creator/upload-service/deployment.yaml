apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: streamvault
  labels:
    app.kubernetes.io/name: upload-service
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: creator
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: upload-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: upload-service, streamvault.io/domain: creator }
    spec:
      serviceAccountName: upload-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: upload-service
          image: harbor.streamvault.internal/streamvault/upload-service:latest
          ports: [{ containerPort: 50200, name: http }]
          envFrom: [{ configMapRef: { name: upload-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50200 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
