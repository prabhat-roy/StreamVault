apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio-dashboard
  namespace: streamvault
  labels:
    app.kubernetes.io/name: studio-dashboard
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: creator
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: studio-dashboard } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: studio-dashboard, streamvault.io/domain: creator }
    spec:
      serviceAccountName: studio-dashboard
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: studio-dashboard
          image: harbor.streamvault.internal/streamvault/studio-dashboard:latest
          ports: [{ containerPort: 50201, name: http }]
          envFrom: [{ configMapRef: { name: studio-dashboard } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50201 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
