apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-creator
  namespace: streamvault
  labels:
    app.kubernetes.io/name: analytics-creator
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: creator
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: analytics-creator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: analytics-creator, streamvault.io/domain: creator }
    spec:
      serviceAccountName: analytics-creator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: analytics-creator
          image: harbor.streamvault.internal/streamvault/analytics-creator:latest
          ports: [{ containerPort: 50202, name: http }]
          envFrom: [{ configMapRef: { name: analytics-creator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50202 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
