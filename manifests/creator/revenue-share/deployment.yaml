apiVersion: apps/v1
kind: Deployment
metadata:
  name: revenue-share
  namespace: streamvault
  labels:
    app.kubernetes.io/name: revenue-share
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: creator
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: revenue-share } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: revenue-share, streamvault.io/domain: creator }
    spec:
      serviceAccountName: revenue-share
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: revenue-share
          image: harbor.streamvault.internal/streamvault/revenue-share:latest
          ports: [{ containerPort: 50203, name: http }]
          envFrom: [{ configMapRef: { name: revenue-share } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50203 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50203 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
