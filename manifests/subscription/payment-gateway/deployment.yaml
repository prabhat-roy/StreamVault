apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: streamvault
  labels:
    app.kubernetes.io/name: payment-gateway
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: subscription
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: payment-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: payment-gateway, streamvault.io/domain: subscription }
    spec:
      serviceAccountName: payment-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: payment-gateway
          image: harbor.streamvault.internal/streamvault/payment-gateway:latest
          ports: [{ containerPort: 50181, name: http }]
          envFrom: [{ configMapRef: { name: payment-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
