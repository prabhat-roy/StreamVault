apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-ingest
  namespace: streamvault
  labels:
    app.kubernetes.io/name: live-ingest
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: live
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: live-ingest } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: live-ingest, streamvault.io/domain: live }
    spec:
      serviceAccountName: live-ingest
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: live-ingest
          image: harbor.streamvault.internal/streamvault/live-ingest:latest
          ports: [{ containerPort: 50120, name: http }]
          envFrom: [{ configMapRef: { name: live-ingest } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50120 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
