apiVersion: apps/v1
kind: Deployment
metadata:
  name: parental-controls
  namespace: streamvault
  labels:
    app.kubernetes.io/name: parental-controls
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: identity
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: parental-controls } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: parental-controls, streamvault.io/domain: identity }
    spec:
      serviceAccountName: parental-controls
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: parental-controls
          image: harbor.streamvault.internal/streamvault/parental-controls:latest
          ports: [{ containerPort: 50022, name: http }]
          envFrom: [{ configMapRef: { name: parental-controls } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50022 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
