apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdn-orchestrator
  namespace: streamvault
  labels:
    app.kubernetes.io/name: cdn-orchestrator
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: cdn
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cdn-orchestrator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cdn-orchestrator, streamvault.io/domain: cdn }
    spec:
      serviceAccountName: cdn-orchestrator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cdn-orchestrator
          image: harbor.streamvault.internal/streamvault/cdn-orchestrator:latest
          ports: [{ containerPort: 50100, name: http }]
          envFrom: [{ configMapRef: { name: cdn-orchestrator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50100 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
