apiVersion: apps/v1
kind: Deployment
metadata:
  name: geo-routing
  namespace: streamvault
  labels:
    app.kubernetes.io/name: geo-routing
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: cdn
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: geo-routing } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: geo-routing, streamvault.io/domain: cdn }
    spec:
      serviceAccountName: geo-routing
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: geo-routing
          image: harbor.streamvault.internal/streamvault/geo-routing:latest
          ports: [{ containerPort: 50103, name: http }]
          envFrom: [{ configMapRef: { name: geo-routing } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50103 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
