apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-cache
  namespace: streamvault
  labels:
    app.kubernetes.io/name: edge-cache
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: cdn
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: edge-cache } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: edge-cache, streamvault.io/domain: cdn }
    spec:
      serviceAccountName: edge-cache
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: edge-cache
          image: harbor.streamvault.internal/streamvault/edge-cache:latest
          ports: [{ containerPort: 50102, name: http }]
          envFrom: [{ configMapRef: { name: edge-cache } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50102 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
