apiVersion: apps/v1
kind: Deployment
metadata:
  name: continue-watching
  namespace: streamvault
  labels:
    app.kubernetes.io/name: continue-watching
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: personalisation
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: continue-watching } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: continue-watching, streamvault.io/domain: personalisation }
    spec:
      serviceAccountName: continue-watching
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: continue-watching
          image: harbor.streamvault.internal/streamvault/continue-watching:latest
          ports: [{ containerPort: 50241, name: http }]
          envFrom: [{ configMapRef: { name: continue-watching } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50241 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
