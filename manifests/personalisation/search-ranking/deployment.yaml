apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-ranking
  namespace: streamvault
  labels:
    app.kubernetes.io/name: search-ranking
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: personalisation
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: search-ranking } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: search-ranking, streamvault.io/domain: personalisation }
    spec:
      serviceAccountName: search-ranking
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: search-ranking
          image: harbor.streamvault.internal/streamvault/search-ranking:latest
          ports: [{ containerPort: 50243, name: http }]
          envFrom: [{ configMapRef: { name: search-ranking } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50243 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50243 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
