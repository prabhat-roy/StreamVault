apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: drm-service, namespace: streamvault }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: drm-service }
  minReplicas: 4
  maxReplicas: 40
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
