apiVersion: apps/v1
kind: Deployment
metadata:
  name: licence-server
  namespace: streamvault
  labels:
    app.kubernetes.io/name: licence-server
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: drm
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: licence-server } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: licence-server, streamvault.io/domain: drm }
    spec:
      serviceAccountName: licence-server
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: licence-server
          image: harbor.streamvault.internal/streamvault/licence-server:latest
          ports: [{ containerPort: 50080, name: http }]
          envFrom: [{ configMapRef: { name: licence-server } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50080 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
