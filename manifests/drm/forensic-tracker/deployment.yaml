apiVersion: apps/v1
kind: Deployment
metadata:
  name: forensic-tracker
  namespace: streamvault
  labels:
    app.kubernetes.io/name: forensic-tracker
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: drm
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: forensic-tracker } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: forensic-tracker, streamvault.io/domain: drm }
    spec:
      serviceAccountName: forensic-tracker
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: forensic-tracker
          image: harbor.streamvault.internal/streamvault/forensic-tracker:latest
          ports: [{ containerPort: 50082, name: http }]
          envFrom: [{ configMapRef: { name: forensic-tracker } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50082 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
