apiVersion: apps/v1
kind: Deployment
metadata:
  name: watch-party-service
  namespace: streamvault
  labels:
    app.kubernetes.io/name: watch-party-service
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: social
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: watch-party-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: watch-party-service, streamvault.io/domain: social }
    spec:
      serviceAccountName: watch-party-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: watch-party-service
          image: harbor.streamvault.internal/streamvault/watch-party-service:latest
          ports: [{ containerPort: 50263, name: http }]
          envFrom: [{ configMapRef: { name: watch-party-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
