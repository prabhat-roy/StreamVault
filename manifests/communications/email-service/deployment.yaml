apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: streamvault
  labels:
    app.kubernetes.io/name: email-service
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: communications
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: email-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: email-service, streamvault.io/domain: communications }
    spec:
      serviceAccountName: email-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: email-service
          image: harbor.streamvault.internal/streamvault/email-service:latest
          ports: [{ containerPort: 50321, name: http }]
          envFrom: [{ configMapRef: { name: email-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50321 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
