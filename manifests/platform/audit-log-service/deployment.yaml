apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-log-service
  namespace: streamvault
  labels:
    app.kubernetes.io/name: audit-log-service
    app.kubernetes.io/part-of: streamvault
    streamvault.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: audit-log-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: audit-log-service, streamvault.io/domain: platform }
    spec:
      serviceAccountName: audit-log-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: audit-log-service
          image: harbor.streamvault.internal/streamvault/audit-log-service:latest
          ports: [{ containerPort: 51008, name: http }]
          envFrom: [{ configMapRef: { name: audit-log-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 51008 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 51008 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
