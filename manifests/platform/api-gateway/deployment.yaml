apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: streamvault
  labels: { app.kubernetes.io/name: api-gateway, app.kubernetes.io/part-of: streamvault, streamvault.io/domain: platform }
spec:
  replicas: 3
  selector: { matchLabels: { app.kubernetes.io/name: api-gateway } }
  template:
    metadata: { labels: { app.kubernetes.io/name: api-gateway, streamvault.io/domain: platform } }
    spec:
      serviceAccountName: api-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: api-gateway
          image: harbor.streamvault.internal/streamvault/api-gateway:latest
          ports: [{ containerPort: 50000, name: http }]
          envFrom: [{ configMapRef: { name: api-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50000 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50000 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 2000m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
