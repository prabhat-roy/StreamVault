---
apiVersion: v1
kind: ResourceQuota
metadata: { name: streamvault-quota, namespace: streamvault }
spec:
  hard:
    requests.cpu: "200"
    requests.memory: 400Gi
    limits.cpu: "400"
    limits.memory: 800Gi
    pods: "1000"
    persistentvolumeclaims: "100"
---
apiVersion: v1
kind: LimitRange
metadata: { name: streamvault-limits, namespace: streamvault }
spec:
  limits:
    - type: Container
      default:        { cpu: 500m, memory: 512Mi }
      defaultRequest: { cpu: 50m,  memory: 64Mi }
      max:            { cpu: 8,    memory: 16Gi }
