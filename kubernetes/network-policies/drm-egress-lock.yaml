# DRM service may only egress to Vault (HSM) and Kafka. No general internet egress;
# preventing accidental key material exfiltration via dependency callbacks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: drm-egress-lock, namespace: streamvault-drm }
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: drm-service } }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { name: vault } }
      ports: [{ port: 8200, protocol: TCP }]
    - to:
        - namespaceSelector: { matchLabels: { name: messaging } }
      ports: [{ port: 9092, protocol: TCP }]
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
