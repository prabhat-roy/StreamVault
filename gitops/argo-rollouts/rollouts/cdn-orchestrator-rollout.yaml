apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: cdn-orchestrator, namespace: streamvault }
spec:
  replicas: 4
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: cdn-orchestrator } }
  template:
    metadata: { labels: { app.kubernetes.io/name: cdn-orchestrator } }
    spec:
      containers:
        - name: cdn-orchestrator
          image: harbor.streamvault.internal/streamvault/cdn-orchestrator:latest
          ports: [{ containerPort: 50050 }]
