apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: recommendation-service, namespace: streamvault }
spec:
  replicas: 4
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: streamvault-canary-analysis }]
            args: [{ name: service-name, value: recommendation-service }]
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: recommendation-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: recommendation-service } }
    spec:
      containers:
        - name: recommendation-service
          image: harbor.streamvault.internal/streamvault/recommendation-service:latest
          ports: [{ containerPort: 50070 }]
