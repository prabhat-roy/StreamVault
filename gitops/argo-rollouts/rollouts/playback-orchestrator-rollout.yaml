apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: playback-orchestrator, namespace: streamvault }
spec:
  replicas: 6
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause: { duration: 10m }
        - analysis:
            templates: [{ templateName: streamvault-canary-analysis }]
            args: [{ name: service-name, value: playback-orchestrator }]
        - setWeight: 25
        - pause: { duration: 10m }
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: playback-orchestrator } }
  template:
    metadata: { labels: { app.kubernetes.io/name: playback-orchestrator } }
    spec:
      containers:
        - name: playback-orchestrator
          image: harbor.streamvault.internal/streamvault/playback-orchestrator:latest
          ports: [{ containerPort: 50060 }]
