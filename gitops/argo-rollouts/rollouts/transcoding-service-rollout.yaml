apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: transcoding-service, namespace: streamvault }
spec:
  replicas: 6
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector: { matchLabels: { app.kubernetes.io/name: transcoding-service } }
  template:
    metadata: { labels: { app.kubernetes.io/name: transcoding-service } }
    spec:
      containers:
        - name: transcoding-service
          image: harbor.streamvault.internal/streamvault/transcoding-service:latest
          ports: [{ containerPort: 50020 }]
