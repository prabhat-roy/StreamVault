apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: stream-packager, namespace: streamvault }
spec:
  replicas: 6
  # Live packager is blue-green: rolling restart would interrupt active streams.
  strategy:
    blueGreen:
      activeService: stream-packager-active
      previewService: stream-packager-preview
      autoPromotionEnabled: false
  selector: { matchLabels: { app.kubernetes.io/name: stream-packager } }
  template:
    metadata: { labels: { app.kubernetes.io/name: stream-packager } }
    spec:
      containers:
        - name: stream-packager
          image: harbor.streamvault.internal/streamvault/stream-packager:latest
          ports: [{ containerPort: 50040 }]
