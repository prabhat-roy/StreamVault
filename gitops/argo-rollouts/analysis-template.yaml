apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: streamvault-canary-analysis
  namespace: streamvault
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 60s
      successCondition: result[0] >= 0.995
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[5m]))
    - name: p95-join-time
      interval: 60s
      successCondition: result[0] <= 2
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(playback_join_time_seconds_bucket{service="{{args.service-name}}"}[5m]))
              by (le))
    - name: rebuffer-ratio
      interval: 60s
      successCondition: result[0] <= 0.005
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability:9090
          query: |
            sum(rate(playback_rebuffer_seconds_total{service="{{args.service-name}}"}[5m]))
            /
            sum(rate(playback_play_seconds_total{service="{{args.service-name}}"}[5m]))
