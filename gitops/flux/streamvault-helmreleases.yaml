# Flux uses HelmReleases generated by an external tool; one HelmRelease per service.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: streamvault-platform, namespace: streamvault }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: streamvault, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: streamvault-cloud-overlay
      valuesKey: cloud-values.yaml
