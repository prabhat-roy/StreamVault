# StreamVault — local development stack.
# Brings up the data stores, message buses, observability, and core security
# dependencies needed to run any service locally.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamvault
      POSTGRES_PASSWORD: streamvault
      POSTGRES_DB: streamvault
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]

  cassandra:
    image: cassandra:5
    environment:
      CASSANDRA_CLUSTER_NAME: streamvault
    ports: ["9042:9042"]
    volumes: ["cassandra-data:/var/lib/cassandra"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports: ["9200:9200"]

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports: ["8123:8123","9000:9000"]
    volumes: ["clickhouse-data:/var/lib/clickhouse"]

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports: ["9092:9092"]
    volumes: ["kafka-data:/bitnami/kafka"]

  nats:
    image: nats:2.10-alpine
    command: ["-js","-m","8222"]
    ports: ["4222:4222","8222:8222"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000","9001:9001"]
    volumes: ["minio-data:/data"]

  vault:
    image: hashicorp/vault:1.17
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports: ["8080:8080"]

  prometheus:
    image: prom/prometheus:v2.55.0
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  loki:
    image: grafana/loki:3.2.0
    ports: ["3100:3100"]

  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports: ["16686:16686","4317:4317","4318:4318"]

volumes:
  postgres-data: {}
  mongo-data: {}
  redis-data: {}
  cassandra-data: {}
  clickhouse-data: {}
  kafka-data: {}
  minio-data: {}
