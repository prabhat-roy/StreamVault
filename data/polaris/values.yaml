# Apache Polaris — Iceberg REST catalog with RBAC + multi-engine support
image: { repository: apache/polaris, tag: latest }
polaris:
  realm: streamvault
  storage:
    s3: { endpoint: http://minio.streamvault.svc:9000, region: us-east-1, bucket: streamvault-iceberg-warehouse }
ingress: { enabled: true, hosts: [{ host: polaris.streamvault.internal }] }
