apiVersion: v1
kind: Service
metadata:
  name: {{ include "revenue-share.fullname" . }}
  labels: {{- include "revenue-share.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - { port: {{ .Values.service.port }}, targetPort: http, protocol: TCP, name: http }
  selector: {{- include "revenue-share.selectorLabels" . | nindent 4 }}
