apiVersion: v1
kind: Service
metadata: { name: {{ include "svc.name" . }}, labels: {{- include "svc.labels" . | nindent 4 }} }
spec:
  type: {{ .Values.service.type }}
  ports: [{ name: http, port: {{ .Values.service.port }}, targetPort: {{ .Values.service.port }} }]
  selector: { app.kubernetes.io/name: {{ include "svc.name" . }} }
