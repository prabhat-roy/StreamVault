streamvault:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres.streamvault.svc
      user: dbt
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: 5432
      dbname: streamvault_warehouse
      schema: public
      threads: 8
    prod:
      type: trino
      host: trino.streamvault.svc
      port: 8080
      catalog: iceberg
      schema: streamvault_mart
      threads: 16
