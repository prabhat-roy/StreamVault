# Shaka Packager — open-source DASH/HLS packager + DRM-aware
apiVersion: batch/v1
kind: Job
metadata: { name: shaka-package, namespace: streamvault-media }
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: packager
          image: google/shaka-packager:v3.3.0
          command:
            - packager
            - "in=input.mp4,stream=video,init_segment=init.mp4,segment_template=$Number$.m4s"
            - "in=input.mp4,stream=audio,init_segment=audio_init.mp4,segment_template=audio_$Number$.m4s"
            - --hls_master_playlist_output=master.m3u8
            - --mpd_output=manifest.mpd
            - --enable_widevine_encryption
