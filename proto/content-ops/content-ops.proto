syntax = "proto3";

package streamvault.content_ops.v1;

option go_package = "github.com/prabhat-roy/StreamVault/proto/content_ops/v1;content_ops_v1";
option java_multiple_files = true;
option java_package = "com.streamvault.content_ops.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// content_ops service for StreamVault
service ContentopsService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Contentops {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Contentops entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Contentops items = 1; common.Pagination page = 2; }
message CreateRequest { Contentops entity = 1; }
message CreateResponse{ Contentops entity = 1; }
message UpdateRequest { Contentops entity = 1; }
message UpdateResponse{ Contentops entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
