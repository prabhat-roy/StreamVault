syntax = "proto3";

package streamvault.growth.v1;

option go_package = "github.com/prabhat-roy/StreamVault/proto/growth/v1;growth_v1";
option java_multiple_files = true;
option java_package = "com.streamvault.growth.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// growth service for StreamVault
service GrowthService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Growth {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Growth entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Growth items = 1; common.Pagination page = 2; }
message CreateRequest { Growth entity = 1; }
message CreateResponse{ Growth entity = 1; }
message UpdateRequest { Growth entity = 1; }
message UpdateResponse{ Growth entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
