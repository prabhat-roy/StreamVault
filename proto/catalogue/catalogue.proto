syntax = "proto3";

package streamvault.catalogue.v1;

option go_package = "github.com/prabhat-roy/StreamVault/proto/catalogue/v1;catalogue_v1";
option java_multiple_files = true;
option java_package = "com.streamvault.catalogue.v1";

import "common/types.proto";
import "google/protobuf/timestamp.proto";

// catalogue service for StreamVault
service CatalogueService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message Catalogue {
  string id = 1;
  string tenant_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  map<string, string> attributes = 5;
}

message GetRequest    { string id = 1; }
message GetResponse   { Catalogue entity = 1; }
message ListRequest   { string tenant_id = 1; common.Pagination page = 2; }
message ListResponse  { repeated Catalogue items = 1; common.Pagination page = 2; }
message CreateRequest { Catalogue entity = 1; }
message CreateResponse{ Catalogue entity = 1; }
message UpdateRequest { Catalogue entity = 1; }
message UpdateResponse{ Catalogue entity = 1; }
message DeleteRequest { string id = 1; }
message DeleteResponse{ bool ok = 1; }
