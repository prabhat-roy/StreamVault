# NGINX origin shield in front of MinIO/S3 — caches HLS/DASH segments to reduce
# CDN origin pulls. Manifests use a short TTL; segments cache for hours.

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=origin:1g max_size=200g inactive=24h use_temp_path=off;

server {
  listen 80;
  server_name origin-shield.streamvault.internal;

  location ~ \.m3u8$ {
    proxy_cache origin;
    proxy_cache_valid 200 2s;
    add_header Cache-Control "public, max-age=2";
    proxy_pass http://minio.streamvault.internal:9000;
  }
  location ~ \.mpd$ {
    proxy_cache origin;
    proxy_cache_valid 200 2s;
    add_header Cache-Control "public, max-age=2";
    proxy_pass http://minio.streamvault.internal:9000;
  }
  location ~ \.(m4s|cmfa|cmfv|ts)$ {
    proxy_cache origin;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600, immutable";
    proxy_pass http://minio.streamvault.internal:9000;
  }
}
