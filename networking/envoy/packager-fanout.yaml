static_resources:
  listeners:
    - name: packager-edge
      address: { socket_address: { address: 0.0.0.0, port_value: 8443 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: packager_edge
                http2_protocol_options: { initial_stream_window_size: 65536 }
                route_config:
                  virtual_hosts:
                    - name: live
                      domains: ["live.streamvault.io"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: stream-packager, timeout: 0s }
                http_filters:
                  - name: envoy.filters.http.router
  clusters:
    - name: stream-packager
      type: STRICT_DNS
      connect_timeout: 0.25s
      load_assignment:
        cluster_name: stream-packager
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: stream-packager.streamvault, port_value: 50040 } } }
