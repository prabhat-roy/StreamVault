receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: { timeout: 5s }
  resourcedetection: { detectors: [env, system, k8s] }
  attributes/scrub-pii:
    actions:
      - { key: user.email, action: delete }
      - { key: viewer.ip,  action: hash }

exporters:
  prometheus:    { endpoint: 0.0.0.0:9464 }
  loki:          { endpoint: http://loki:3100/loki/api/v1/push }
  otlp/tempo:    { endpoint: tempo:4317, tls: { insecure: true } }
  clickhouse:    { endpoint: tcp://clickhouse:9000, database: qoe, table: playback_event }

service:
  pipelines:
    traces:  { receivers: [otlp], processors: [batch, resourcedetection], exporters: [otlp/tempo] }
    metrics: { receivers: [otlp], processors: [batch], exporters: [prometheus] }
    logs:    { receivers: [otlp], processors: [batch, attributes/scrub-pii], exporters: [loki, clickhouse] }
