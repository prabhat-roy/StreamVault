global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: streamvault-services
    kubernetes_sd_configs: [{ role: pod }]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_part_of]
        action: keep
        regex: streamvault
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"

rule_files:
  - alerts/qoe.yaml
  - alerts/packager.yaml
  - alerts/drm.yaml
