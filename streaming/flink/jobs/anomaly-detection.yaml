apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: streamvault-anomaly-detection, namespace: streamvault }
spec:
  deploymentName: streamvault-flink
  job:
    jarURI: s3://streamvault-flink-jobs/anomaly-detection.jar
    parallelism: 6
    upgradeMode: savepoint
    args: ["--source-topic", "streamvault.metrics.raw", "--sink-topic", "streamvault.alerts.anomaly"]
