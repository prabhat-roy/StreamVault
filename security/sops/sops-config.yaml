creation_rules:
  - path_regex: secrets/streamvault/.*\.yaml
    kms: arn:aws:kms:us-east-1:111111111111:alias/streamvault-sops
  - path_regex: secrets/streamvault/gcp/.*\.yaml
    gcp_kms: projects/streamvault-prod/locations/global/keyRings/streamvault/cryptoKeys/sops
