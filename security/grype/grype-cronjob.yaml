apiVersion: batch/v1
kind: CronJob
metadata: { name: grype-scan, namespace: streamvault-security }
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: grype
              image: anchore/grype:latest
              args: ["registry:harbor.streamvault.internal/streamvault","-o","json"]
